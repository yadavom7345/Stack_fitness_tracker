<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STACK — Workout Tracker</title>
    <meta name="description"
        content="STACK zero-friction workout logger. Log sets, track 1RM, analyze volume trends." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="app.css" />
</head>

<body>

    <!-- ═══ Sidebar ═══ -->
    <aside id="sidebar" class="sidebar">
        <a href="index.html" class="sidebar-logo">STACK</a>
        <nav class="sidebar-nav">
            <a href="#dashboard" class="nav-item active" data-view="dashboard" data-tooltip="Dashboard">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="#workout" class="nav-item" data-view="workout" data-tooltip="Log Workout">
                <svg viewBox="0 0 24 24">
                    <path d="M6.5 6.5h11M6.5 17.5h11M2 12h4m12 0h4M6 6.5V4m0 16v-2.5M18 6.5V4m0 16v-2.5" />
                </svg>
                <span>Workout</span>
            </a>
            <a href="#history" class="nav-item" data-view="history" data-tooltip="History">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span>History</span>
            </a>
            <a href="#analytics" class="nav-item" data-view="analytics" data-tooltip="Analytics">
                <svg viewBox="0 0 24 24">
                    <path d="M3 3v18h18" />
                    <path d="m19 9-5 5-4-4-3 3" />
                </svg>
                <span>Analytics</span>
            </a>
            <a href="#settings" class="nav-item" data-view="settings" data-tooltip="Settings">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- ═══ Mobile Bottom Bar ═══ -->
    <nav class="bottom-bar">
        <a href="#dashboard" class="bottom-item active" data-view="dashboard">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            <span>Home</span>
        </a>
        <a href="#workout" class="bottom-item" data-view="workout">
            <svg viewBox="0 0 24 24">
                <path d="M6.5 6.5h11M6.5 17.5h11M2 12h4m12 0h4M6 6.5V4m0 16v-2.5M18 6.5V4m0 16v-2.5" />
            </svg>
            <span>Log</span>
        </a>
        <a href="#history" class="bottom-item" data-view="history">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>History</span>
        </a>
        <a href="#analytics" class="bottom-item" data-view="analytics">
            <svg viewBox="0 0 24 24">
                <path d="M3 3v18h18" />
                <path d="m19 9-5 5-4-4-3 3" />
            </svg>
            <span>Stats</span>
        </a>
        <a href="#settings" class="bottom-item" data-view="settings">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
            <span>Settings</span>
        </a>
    </nav>

    <!-- ═══ Main Content ═══ -->
    <main id="main-content" class="main-content">
        <!-- Views injected by JS -->
    </main>

    <!-- ═══ Rest Timer Modal ═══ -->
    <div id="rest-timer-modal" class="modal-overlay" style="display:none;">
        <div class="modal rest-timer-modal">
            <div class="timer-ring-container">
                <svg class="timer-ring" viewBox="0 0 120 120">
                    <circle class="timer-ring-bg" cx="60" cy="60" r="52" />
                    <circle id="timer-ring-progress" class="timer-ring-progress" cx="60" cy="60" r="52" />
                </svg>
                <div class="timer-display">
                    <span id="timer-value" class="timer-value">1:30</span>
                    <span class="timer-label">REST</span>
                </div>
            </div>
            <div class="timer-controls">
                <button id="timer-minus" class="timer-btn">−15s</button>
                <button id="timer-skip" class="btn btn-primary">Skip</button>
                <button id="timer-plus" class="timer-btn">+15s</button>
            </div>
        </div>
    </div>

    <!-- ═══ Toast ═══ -->
    <div id="toast" class="toast" role="alert">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6 9 17l-5-5" />
        </svg>
        <span id="toast-msg">Saved!</span>
    </div>

    <script src="app.js"></script>
</body>

</html>
